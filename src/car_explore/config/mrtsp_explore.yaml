frontier_explorer:
  ros__parameters:
    # 实机使用系统时间；仿真时由 launch 参数覆盖为 true。
    use_sim_time: false

    # 与 slam_toolbox、Nav2 当前话题及 TF 配置保持一致。
    map_topic: /map
    costmap_topic: /global_costmap/costmap
    local_costmap_topic: /local_costmap/costmap
    navigate_to_pose_action_name: /navigate_to_pose
    global_frame: map
    robot_base_frame: base_link

    # slam_toolbox 的 /map 使用 transient-local，代价地图使用 volatile/reliable。
    map_qos_durability: transient_local
    map_qos_reliability: reliable
    map_qos_depth: 1
    costmap_qos_reliability: reliable
    costmap_qos_depth: 10
    local_costmap_qos_reliability: inherit
    local_costmap_qos_depth: -1

    # 启动后自动进行全局自主探索，不依赖相机或目标方向输入。
    autostart: true
    control_service_enabled: true
    map_processing_rate_hz: 1.0

    # 第一轮使用低开销 Greedy MRTSP，验证能否减少 explore_lite 的重复路线。
    # DP 会同时评估多步候选路线，确认香橙派余量后再单独测试。
    mrtsp_solver: greedy
    weight_distance_wd: 1.0
    weight_gain_ws: 1.0

    # 仅用于 MRTSP 到达时间估计，不会直接修改 Nav2 速度指令。
    max_linear_speed_vmax: 0.22
    max_angular_speed_wmax: 1.2
    sensor_effective_range_m: 1.5

    # WFD 前对地图做轻量去噪；0.05m 地图上最小 Frontier 为连续5格。
    frontier_map_optimization_enabled: true
    sigma_s: 2.0
    sigma_r: 30.0
    dilation_kernel_radius_cells: 1
    min_frontier_size_cells: 5

    # 车体最远边约0.22m。过滤紧贴车体的微小目标，同时保留窄区域入口。
    frontier_candidate_min_goal_distance_m: 0.30
    frontier_selection_min_distance: 0.35
    frontier_visit_tolerance: 0.35

    # 允许落在较低膨胀代价区域的 Frontier；真正轨迹仍由 Nav2 footprint
    # 和局部/全局 costmap 做碰撞检查。
    occ_threshold: 80
    escape_enabled: true

    # 不在行驶中频繁抢占目标；对连续失败或长时间无进展的 Frontier
    # 暂时抑制，避免在同一不可达目标上反复清图和恢复。
    goal_preemption_enabled: false
    # 不在发送前按目标点单格代价直接跳过。局部 costmap 中 cost=99
    # 的 Frontier 否则会每秒被重选却永远不派发，也无法进入失败抑制。
    # 交给 Nav2 利用规划容差选附近可达点；失败后再由下方抑制机制处理。
    goal_skip_on_blocked_goal: false
    frontier_suppression_enabled: true
    frontier_suppression_attempt_threshold: 2
    frontier_suppression_no_progress_timeout_s: 12.0
    frontier_suppression_progress_epsilon_m: 0.10
    frontier_suppression_timeout_s: 60.0
    frontier_suppression_startup_grace_period_s: 15.0
    # 如果当前仅剩被抑制的目标，返回起点等待地图更新，避免原地空等。
    all_frontiers_suppressed_behavior: return_to_start

    # 到达一个 Frontier 后稍等一帧地图更新，避免立即基于旧地图选新目标。
    post_goal_settle_enabled: true
    post_goal_min_settle: 0.5

    # 所有有效 Frontier 探索完毕后，返回节点启动时记录的 map 位姿。
    return_to_start_on_complete: true
    completion_event_enabled: true
    completion_event_topic: /exploration_complete

    # 调试话题，可在 RViz/Foxglove 对比候选、选中目标和优化地图。
    frontier_marker_topic: /explore/frontiers
    selected_frontier_topic: /explore/selected_frontier
    optimized_map_topic: /explore/optimized_map
    frontier_marker_scale: 0.10
