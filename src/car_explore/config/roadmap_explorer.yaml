roadmap_explorer_node:
  ros__parameters:
    use_sim_time: false

    # 实机运行 slam_toolbox 在线建图，直接使用 /map；不启用上游的定位模式传感器模拟器。
    localisation_only_mode: false

    frontierSearch:
      # 赛场为几米级，先在近处寻找前沿，找不到时逐步扩大搜索范围。
      frontier_search_distance: 4.0
      max_permissable_frontier_search_distance: 12.0
      increment_search_distance_by: 2.0
      plugin_name: "GridBasedBFS"
      GridBasedBFS:
        plugin_type: "roadmap_explorer::FrontierBFSearch"
        min_frontier_cluster_size: 0.15
        max_frontier_cluster_size: 4.0
        lethal_threshold: 160

    costAssigner:
      information_gain_plugin_name: "CountBasedGain"
      CountBasedGain:
        plugin_type: "roadmap_explorer::CountBasedGain"
        # LD19 为 360 度雷达；限制收益计算半径，控制香橙派计算量。
        # 两米足够覆盖当前赛场局部可见区，并降低每个 frontier 的射线计算量。
        # 射线终点还会在插件内截断至不断扩张的 SLAM 地图边界。
        max_camera_depth: 2.0
        delta_theta: 0.10
        camera_fov: 6.283185307
        factor_of_max_is_min: 0.30

      planner_plugin_name: "FrontierRoadmap"
      FrontierRoadmap:
        plugin_type: "roadmap_explorer::PluginFrontierRoadmap"
        closeness_rejection_threshold: 0.25
        planner_allow_unknown: true
        max_planning_distance_roadmap: 6.0

    frontierRoadmap:
      max_graph_reconstruction_distance: 4.0
      grid_cell_size: 0.50
      radius_to_decide_edges: 2.0
      min_distance_between_two_frontier_nodes: 0.20
      min_distance_between_robot_pose_and_node: 0.20

    fullPathOptimizer:
      num_frontiers_in_local_area: 5.0
      local_frontier_search_radius: 4.0
      add_yaw_to_tsp: false
      add_distance_to_robot_to_tsp: true
      # 新目标至少好 15% 才切换，减少频繁取消 Nav2 目标。
      goal_hysteresis_threshold: 0.15

    # 终点相对 Roadmap 第一次决策时的小车姿态：+X 向前，+Y 向左。
    # launch 中的 goal_forward / goal_left 会覆盖这里的默认值。
    goalDirected:
      enabled: true
      goal_forward: 3.0
      goal_left: 0.0
      # 最高优先级只接受目标方向左右各25°；上一轮右偏36.7°的前沿
      # 因而不会再被当作主方向候选。
      primary_cone_deg: 25.0
      # 主方向没有可达前沿时，将左右各90°内的前沿作为次优绕行候选；
      # 超过90°的候选还会保留，但优先级进一步降低。
      fallback_cone_deg: 90.0
      target_progress_weight: 5.0
      information_gain_weight: 1.2
      travel_cost_weight: 1.0
      heading_cost_weight: 0.7

    explorationBT:
      bt_sleep_ms: 100
      # 20m x 20m 的保护边界，覆盖当前赛场且避免错误前沿无限扩张。
      exploration_boundary: [10.0, 10.0, 10.0, -10.0, -10.0, -10.0, -10.0, 10.0]
      abort_exploration_on_nav2_abort: false
      localisation_only_mode: false

    # 建图模式不会创建 SensorSimulator，但参数保留以满足上游参数声明。
    sensorSimulator:
      input_map_topic: "/map"
      input_map_is_transient_local: true
      explored_map_topic: "/explored_map"
      angular_resolution: 0.013
      sensor_update_rate: 1.0
      sensor_min_angle: 0.0
      sensor_max_angle: 6.283185307
      sensor_max_range: 3.5

roadmap_explorer_costmap:
  roadmap_explorer_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_link
      transform_tolerance: 0.5
      update_frequency: 2.0
      publish_frequency: 1.0
      resolution: 0.05
      track_unknown_space: true

      # 与 Nav2 使用同一实测不对称车身，保留 3cm 规划余量。
      footprint: "[[0.197, 0.093], [0.197, -0.093], [-0.033, -0.093], [-0.033, 0.093]]"
      footprint_padding: 0.03

      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: "/map"
        map_subscribe_transient_local: true
        enabled: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        # Roadmap 自身只负责筛选 Frontier，保持0.15m避免把未知边界全部过滤掉；
        # 真正行驶仍由 Nav2 0.25m 膨胀层和完整 footprint 做碰撞约束。
        inflation_radius: 0.15
        cost_scaling_factor: 3.0
        inflate_unknown: false
        inflate_around_unknown: false
      always_send_full_costmap: false

roadmap_explore_mission:
  ros__parameters:
    use_sim_time: false
    map_frame: map
    base_frame: base_link
    map_topic: /map
    planner_id: GridBased
    start_delay: 5.0
    return_to_start: false
    goal_directed_mode: true
    goal_forward: 3.0
    goal_left: 0.0
    goal_radius: 0.25
    visual_parking_enabled: true
    # Nav2只到达标称停车板中心前方的预泊车点；任务节点按XY距离主动取消，
    # 不等待SimpleGoalChecker的终点航向对齐。
    preparking_distance: 0.35
    preparking_candidate_radius: 0.08
    # 专用position_goal_checker为0.05m；任务节点在0.06m内主动交接。
    position_arrival_tolerance: 0.06
    # launch文件会覆盖为car_navigation内已安装的绝对路径。
    position_only_bt_xml: ""
    # 完整Tag的位姿、数量、重投影误差和内点数必须同时新鲜且稳定0.5秒。
    tag_pose_topic: /apriltag_detector/tag_pose
    tag_count_topic: /apriltag_detector/visible_tag_count
    tag_error_topic: /apriltag_detector/reprojection_error
    tag_inlier_topic: /apriltag_detector/inlier_count
    parking_complete_topic: /board_parker/parking_complete
    parking_enable_service: /board_parker/set_enabled
    tag_max_age: 0.40
    tag_confirm_time: 0.50
    tag_max_reprojection_error: 3.0
    tag_min_inlier_points: 4
    tag_acquire_timeout: 2.0
    tag_handoff_max_target_distance: 0.75
    # 无Tag时只允许Nav2在预泊车点附近做5个代价地图验证过的搜索点。
    search_forward_step: 0.10
    search_lateral_step: 0.14
    search_dwell_time: 1.5
    search_timeout: 25.0
    parking_timeout: 45.0
    # 预泊车点与标称终点间必须无遮挡；隔墙不会因欧氏距离近而提前交接。
    # 只有目标位于已知安全自由区，且Nav2路径至少85%已知，才停止Roadmap探索。
    direct_path_known_ratio: 0.85
    direct_check_period: 1.0
    # Roadmap长时间没有位置进展时，取消其高频无Frontier循环，用Nav2执行
    # 一次朝预泊车点的短距离已知区域探测，再继续原Roadmap会话。
    progressive_probe_enabled: true
    # 降速后允许Nav2完成原地转向和窄道绕障，避免已规划路径在8秒时被取消。
    exploration_stall_timeout: 12.0
    exploration_progress_distance: 0.10
    progressive_probe_step: 0.35
    progressive_probe_min_step: 0.20
    progressive_probe_fan_angles_deg: [0.0, 15.0, -15.0, 30.0, -30.0, 45.0, -45.0]
    progressive_probe_min_progress: 0.12
    # 不让探测路径穿过未知区；endpoint_clearance还要求终点周围已知且无障碍。
    progressive_probe_known_ratio: 1.0
    progressive_probe_settle_time: 1.0
    progressive_probe_max_attempts: 6
    progressive_probe_max_failures: 3
    mission_timeout: 300.0
    free_threshold: 20
    occupied_threshold: 65
    endpoint_clearance: 0.14
