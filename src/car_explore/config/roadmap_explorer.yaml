roadmap_explorer_node:
  ros__parameters:
    use_sim_time: false

    # 实机运行 slam_toolbox 在线建图，直接使用 /map；不启用上游的定位模式传感器模拟器。
    localisation_only_mode: false

    frontierSearch:
      # 赛场为几米级，先在近处寻找前沿，找不到时逐步扩大搜索范围。
      frontier_search_distance: 4.0
      max_permissable_frontier_search_distance: 12.0
      increment_search_distance_by: 2.0
      plugin_name: "GridBasedBFS"
      GridBasedBFS:
        plugin_type: "roadmap_explorer::FrontierBFSearch"
        min_frontier_cluster_size: 0.15
        max_frontier_cluster_size: 4.0
        lethal_threshold: 160

    costAssigner:
      information_gain_plugin_name: "CountBasedGain"
      CountBasedGain:
        plugin_type: "roadmap_explorer::CountBasedGain"
        # LD19 为 360 度雷达；限制收益计算半径，控制香橙派计算量。
        # 两米足够覆盖当前赛场局部可见区，并降低每个 frontier 的射线计算量。
        # 射线终点还会在插件内截断至不断扩张的 SLAM 地图边界。
        max_camera_depth: 2.0
        delta_theta: 0.10
        camera_fov: 6.283185307
        factor_of_max_is_min: 0.30

      planner_plugin_name: "FrontierRoadmap"
      FrontierRoadmap:
        plugin_type: "roadmap_explorer::PluginFrontierRoadmap"
        closeness_rejection_threshold: 0.25
        planner_allow_unknown: true
        max_planning_distance_roadmap: 6.0

    frontierRoadmap:
      max_graph_reconstruction_distance: 4.0
      grid_cell_size: 0.50
      radius_to_decide_edges: 2.0
      min_distance_between_two_frontier_nodes: 0.20
      min_distance_between_robot_pose_and_node: 0.20

    fullPathOptimizer:
      num_frontiers_in_local_area: 5.0
      local_frontier_search_radius: 4.0
      add_yaw_to_tsp: false
      add_distance_to_robot_to_tsp: true
      # 新目标至少好 15% 才切换，减少频繁取消 Nav2 目标。
      goal_hysteresis_threshold: 0.15

    explorationBT:
      bt_sleep_ms: 100
      # 20m x 20m 的保护边界，覆盖当前赛场且避免错误前沿无限扩张。
      exploration_boundary: [10.0, 10.0, 10.0, -10.0, -10.0, -10.0, -10.0, 10.0]
      abort_exploration_on_nav2_abort: false
      localisation_only_mode: false

    # 建图模式不会创建 SensorSimulator，但参数保留以满足上游参数声明。
    sensorSimulator:
      input_map_topic: "/map"
      input_map_is_transient_local: true
      explored_map_topic: "/explored_map"
      angular_resolution: 0.013
      sensor_update_rate: 1.0
      sensor_min_angle: 0.0
      sensor_max_angle: 6.283185307
      sensor_max_range: 3.5

roadmap_explorer_costmap:
  roadmap_explorer_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_link
      transform_tolerance: 0.5
      update_frequency: 2.0
      publish_frequency: 1.0
      resolution: 0.05
      track_unknown_space: true

      # 与 Nav2 使用同一实测不对称车身，保留 3cm 规划余量。
      footprint: "[[0.197, 0.093], [0.197, -0.093], [-0.033, -0.093], [-0.033, 0.093]]"
      footprint_padding: 0.03

      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: "/map"
        map_subscribe_transient_local: true
        enabled: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.15
        cost_scaling_factor: 3.0
        inflate_unknown: false
        inflate_around_unknown: false
      always_send_full_costmap: false
