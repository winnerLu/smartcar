# car_base 节点参数(实测标定值见 docs/protocols/car_base_标定记录.md)
car_base:
  ros__parameters:
    port: /dev/car_base   # udev 固定软链接(见 99-smartcar.rules),不受 ttyACM 编号漂移影响
    baud: 115200
    # 启动文件按模式覆盖：直连cmd_vel、仅仲裁cmd_vel_raw、
    # 仲裁+碰撞监控cmd_vel_safe。
    cmd_vel_topic: cmd_vel
    # 速度符号:控制帧字节布局修正后(预留位2字节)需重新实测确认,先设 +1
    cmd_vx_sign: 1
    cmd_wz_sign: 1
    # 里程计符号:需实测确认(前进 vx 为正、左转 wz 为正)
    odom_vx_sign: 1
    odom_wz_sign: 1
    # 幅值标定(2026-07-17 实测):
    #   线速度准,scale=1.0;角速度转3圈(1080°)odom显示960°,scale=1080/960=1.125
    odom_wz_scale: 1.125
    odom_vx_scale: 1.0
    voltage_scale: 1.0
    # 超时保护:200ms 无 cmd_vel 自动停车
    cmd_timeout_ms: 200
    # 速度硬上限(兜底防溢出/危险速度)
    max_vx: 0.5
    max_wz: 2.0
    # IMU 已装并验证通过,发布 /imu/data_raw
    publish_imu: true
    # 坐标系
    odom_frame: odom
    base_frame: base_link
    publish_tf: true
