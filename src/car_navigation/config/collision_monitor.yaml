# Nav2 Collision Monitor：根据当前速度方向预测车体是否将与激光点碰撞。
# 输入 /cmd_vel_raw（twist_mux 输出），输出 /cmd_vel_safe（给 car_base）。
# approach 会沿当前线速度和角速度模拟 footprint：朝障碍运动时逐渐降速，
# 远离障碍时不会被另一侧障碍错误拦停，因此允许安全倒车脱困。
# 雷达扫不到的低矮、透明障碍仍不受此软件防护。
collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_raw"      # twist_mux 输出
    cmd_vel_out_topic: "cmd_vel_safe"    # car_base 的速度输入
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0

    # 固定前/后 stop、slowdown 区不区分运动方向，会阻止逃离障碍，故改用 approach。
    polygons: ["footprint_approach"]
    footprint_approach:
      type: "polygon"
      action_type: "approach"
      # 使用实测车身轮廓，不复用 local_costmap 含 3cm padding 的 footprint。
      # 代价地图 padding 负责提前绕障；碰撞监控只做真实车体边界的紧急兜底。
      # 否则障碍进入 padding 后会被视为已经在 polygon 内，连后退恢复也会被拦截。
      points: "[[0.197, 0.093], [0.197, -0.093], [-0.033, -0.093], [-0.033, 0.093]]"
      # 紧急兜底模式：只在预计 0.4s 内将发生碰撞时介入。
      # 最高前进速度 0.22m/s 时约对应 0.09m 预测距离；低速恢复时更短。
      time_before_collision: 0.4
      simulation_time_step: 0.1
      # 源码判定为 inside_points > max_points，即至少 6 个点触发；
      # 可过滤零散噪点，但细杆、透明和低矮障碍更可能漏检。
      max_points: 5
      visualize: true
      polygon_pub_topic: "footprint_approach"
      enabled: true

    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      min_height: 0.0
      max_height: 2.0
      enabled: true
