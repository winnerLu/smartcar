# Nav2 Collision Monitor：根据当前速度方向预测车体是否将与激光点碰撞。
# 输入 /cmd_vel_raw（twist_mux 输出），输出 /cmd_vel_safe（给 car_base）。
# approach 会沿当前线速度和角速度模拟 footprint：朝障碍运动时逐渐降速，
# 远离障碍时不会被另一侧障碍错误拦停，因此允许安全倒车脱困。
# 雷达扫不到的低矮、透明障碍仍不受此软件防护。
collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_raw"      # twist_mux 输出
    cmd_vel_out_topic: "cmd_vel_safe"    # car_base 的速度输入
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0

    # 固定前/后 stop、slowdown 区不区分运动方向，会阻止逃离障碍，故改用 approach。
    polygons: ["footprint_approach"]
    footprint_approach:
      type: "polygon"
      action_type: "approach"
      # Nav2 局部代价地图发布的实际（含 padding）车体轮廓。
      # 启动探索前必须确认此话题存在且持续发布。
      footprint_topic: "/local_costmap/published_footprint"
      # 保持预计碰撞时间不小于 1.2s；越接近碰撞，输出速度越低。
      time_before_collision: 1.2
      simulation_time_step: 0.1
      # 源码判定为 inside_points > max_points，即至少 4 个点触发。
      max_points: 3
      visualize: true
      polygon_pub_topic: "footprint_approach"
      enabled: true

    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      min_height: 0.0
      max_height: 2.0
      enabled: true
